<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootStrap5, Test</title>

    <!-- BootStrap css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- our code here -->

    <h1>BootStrap Grid System</h1>
    <!-- 
    xs(col) < 576px
    sm >=  576px
    md >=  768px
    lg >=  992px
    xl >=  1200px
    xxl >= 1400px
    -->

    <div class="container">

        <!-- <div class="row justify-content-around"> -->
        <!-- <div class="row justify-content-evenly"> -->
        <!-- <div class="row justify-content-between"> -->
        <div class="row justify-content-center align-items-center">
            <!-- <div class="row align-content-start">
        <div class="row align-content-end"> -->
            <!-- <div class="col-2 align-self-start">col 1</div>
            <div class="col-2 align-self-center">col 2</div>
            <div class="col-2 align-self-end">col 3</div> -->
            <div class="col align-self-end bg-primary text-light">one</div>
            <div class="col align-self-end bg-secondary">two</div>
            <div class="col align-self-end bg-success">three</div>
            <div class="col align-self-end bg-danger">four</div>
            <div class="col align-self-end bg-warning">five</div>
            <div class="col align-self-end bg-info">six</div>
            <div class="col align-self-end bg-light text-danger">seven</div>
            <div class="col align-self-end bg-dark text-warning">eight</div>
        </div>
        <br>
        <div class="alert alert-primary d-flex gap-2">
            <i class="bi bi-info-circle-fill"></i>
            <p class="m-0">Hi, This is an alert message</p>
        </div>

    </div>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-outline-primary">Primary</button>

    <br>
    <br>
    <br>

    <div class=" btn-group btn-group-lg mb-5">
        <button class="btn btn-primary">Left</button>
        <button class="btn btn-primary">Center</button>
        <button class="btn btn-primary">Right</button>
    </div>
    <div class=" btn-group mb-5">
        <button class="btn btn-outline-primary">Left</button>
        <button class="btn btn-outline-primary">Center</button>
        <button class="btn btn-outline-primary">Right</button>
    </div>

    <div class="row bg-dark p-1">
        <div class="col-8"><button class="btn btn-primary">click</button></div>
        <div class="col-1"><button class="btn btn-primary">click</button></div>
        <div class="col-2 mx-3"><button class="btn btn-primary">click</button></div>
    </div>
    <div class="row bg-primary p-1 text-center">
        <div class="col mx-auto"><button class="btn btn-dark">click</button></div>
    </div>
    <div class="row bg-dark p-1">
        <div class="col-4 text-start"><button class="btn btn-primary">click</button></div>
        <div class="col-4 text-center"><button class="btn btn-primary">click</button></div>
        <div class="col-4 text-end"><button class="btn btn-primary">click</button></div>
    </div>

    <div class="container my-5">

        <div class="card" style="width: 15rem;">
            <img class="card-img-top" src="assets/ims/iphone.jpg" alt="">
            <div class="card-body bg-dark">
                <h5 class="card-title text-warning">Iphone X</h5>
                <p class="card-text text-light">Lorem ipsum dolor sit amet consectetur adipisicing elit. Architecto
                    nesciunt labore
                    minima molestias officia voluptates nam.</p>
                <a href="#" class="btn btn-danger">See Details</a>
            </div>
        </div>

    </div>

    <div id="c1" class="carousel slide">

        <!-- images -->
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="assets/ims/first.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="assets/ims/second.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="assets/ims/third.jpg" class="d-block w-100" alt="...">
            </div>

            <!-- indecartors -->
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#c1" data-bs-slide-to="0" class="active" aria-current="true"
                    aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#c1" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#c1" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>

            <!-- buttons -->
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#c1" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#c1" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <!-- Large button groups (default and split) -->
    <div class="container mt-5">
        <div class="btn-group">
            <button class="btn btn-secondary btn-lg dropdown-toggle" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                Large button
            </button>
            <ul class="dropdown-menu">
                ...
            </ul>
        </div>
        <div class="btn-group">
            <button class="btn btn-secondary btn-lg" type="button">
                Large split button
            </button>
            <button type="button" class="btn btn-lg btn-secondary dropdown-toggle dropdown-toggle-split"
                data-bs-toggle="dropdown" aria-expanded="false">
                <span class="visually-hidden">Toggle Dropdown</span>
            </button>
            <ul class="dropdown-menu">
                ...
            </ul>
        </div>
    </div>
    <!-- BootStrap js -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <!-- js -->
    <script src="assets/js/main.js"></script>
</body>

</html>
